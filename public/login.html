<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./ruta-logo.svg" type="image/x-icon">
  <link rel="stylesheet" href="./auth.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap');
  </style>
  <title>Ruta | Log In</title>
</head>
<body>
  <main class="auth-container">
    <header class="auth-header">
      <a href="./index.html">
        <img src="./ruta-logo.svg" alt="Ruta Logo">
      </a>
      <h1>Welcome Back</h1>
      <p>Enter your credentials to access your roadmaps</p>
    </header>

    <div class="error-banner" id="errorBanner"></div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com" 
          required 
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password" 
          required 
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="auth-btn" id="submitBtn">
        <span class="btn-spinner" id="btnSpinner"></span>
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <footer class="auth-footer">
      Don't have an account? <a href="./signup.html">Create one here</a>
    </footer>
  </main>
  
  <script src="./auth.js"></script>
</body>
</html>
